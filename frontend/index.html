<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System rejestracji wizyt</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>System rejestracji wizyt</h1>

      <section class="card">
        <h2>Umów wizytę</h2>
        <form id="visit-form">
          <label>
            Pacjent (imię i nazwisko)
            <input type="text" id="patient-name" required />
          </label>
          <label>
            Lekarz
            <select id="doctor" required></select>
          </label>
          <label>
            Data i godzina
            <input type="datetime-local" id="visit-date" required />
          </label>
          <button type="submit">Zarezerwuj</button>
          <p id="form-message" class="message"></p>
        </form>
      </section>

      <section class="card">
        <h2>Zaplanowane wizyty</h2>
        <table id="visits-table">
          <thead>
            <tr>
              <th>Pacjent</th>
              <th>Lekarz</th>
              <th>Termin</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
